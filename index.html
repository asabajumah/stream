<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
  text-align:center;
}

/* HERO */
.hero{
  padding:60px 20px;
  background:linear-gradient(to bottom,#020617,#0f172a);
}

.hero h1{
  color:#38bdf8;
  font-size:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  max-width:1000px;
  margin:40px auto;
  padding:0 20px;
}

.card{
  background:#1e293b;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.card h3{
  color:#38bdf8;
  margin:0;
}

.card p{
  color:#cbd5e1;
}

/* LINKS */
.links a{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin:5px;
  padding:8px 10px;
  border-radius:6px;
  text-decoration:none;
  font-size:14px;
  background:#0f172a;
  color:white;
}

.links a:hover{
  background:#38bdf8;
  color:black;
}

/* PLATFORM GRID */
.profiles{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:15px;
  max-width:800px;
  margin:40px auto;
}

.profile-card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  text-decoration:none;
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  transition:0.3s;
}

.profile-card:hover{
  transform:scale(1.05);
  background:#38bdf8;
  color:black;
}

.profile-card img{
  width:32px;
  height:32px;
}

/* FOOTER */
footer{
  background:#0f172a;
  padding:25px;
  margin-top:50px;
}
</style>
</head>
